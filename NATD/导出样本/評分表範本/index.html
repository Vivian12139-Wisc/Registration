<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>評分表範本</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --card2: #f9f9fb;
    --text: #1c1c1e;
    --sub: #6e6e73;
    --accent: #0071e3;
    --accent-bg: #e8f1fd;
    --folder-icon: #ff9f0a;
    --file-icon: #30b0c7;
    --border: rgba(0,0,0,0.06);
    --shadow: 0 2px 16px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.13), 0 0 0 0.5px rgba(0,0,0,0.06);
    --radius: 18px;
    --radius-sm: 10px;
    --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    --mono: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --card2: #3a3a3c;
      --text: #f5f5f7;
      --sub: #98989d;
      --accent: #2997ff;
      --accent-bg: #1a2a3d;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 2px 16px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.04);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.06);
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2.5rem 1.25rem 4rem;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 760px; margin: 0 auto; }

  /* ── 面包屑 ── */
  .crumbs {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 2px;
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 2rem;
    font-family: var(--mono);
  }
  .crumbs a { color: var(--accent); text-decoration: none; padding: 2px 6px; border-radius: 6px; transition: background .15s; }
  .crumbs a:hover { background: var(--accent-bg); }
  .crumbs .sep { color: var(--border); user-select: none; padding: 0 1px; }
  .crumbs .now { color: var(--sub); padding: 2px 6px; }

  /* ── 标题 ── */
  .page-title {
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 2rem;
    line-height: 1.15;
  }
  .page-title small {
    display: block;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--sub);
    letter-spacing: 0;
    margin-top: 4px;
  }

  /* ── Section 标题 ── */
  .section-hd {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--sub);
    margin: 0 4px 10px;
  }

  /* ── 文件夹卡片网格 ── */
  .folder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }
  .folder-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.2rem 1.2rem 1rem;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow .2s, transform .2s;
    cursor: pointer;
  }
  .folder-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .folder-card:active { transform: translateY(0); }
  .folder-icon {
    width: 44px; height: 44px;
    background: linear-gradient(145deg, #ffbe42, var(--folder-icon));
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 8px rgba(255,159,10,.3);
    flex-shrink: 0;
  }
  .folder-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    word-break: break-all;
  }
  .folder-arrow {
    font-size: 12px;
    color: var(--sub);
    align-self: flex-end;
    margin-top: auto;
  }

  /* ── 文件列表卡片 ── */
  .file-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: .85rem 1.2rem;
    text-decoration: none;
    color: var(--text);
    border-bottom: 0.5px solid var(--border);
    transition: background .15s;
  }
  .file-row:last-child { border-bottom: none; }
  .file-row:hover { background: var(--card2); }
  .file-icon-wrap {
    width: 34px; height: 34px;
    background: linear-gradient(145deg, #5ad4e6, var(--file-icon));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(48,176,199,.25);
  }
  .file-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }
  .file-arrow { font-size: 12px; color: var(--sub); }

  /* ── 空状态 ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    color: var(--sub);
    font-size: 14px;
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: .75rem; }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--sub);
    margin-top: 3rem;
    opacity: .6;
    font-family: var(--mono);
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="crumbs"><a href="../../../index.html">🏠 根目录</a> <span class="sep">/</span> <a href="../../index.html">NATD</a> <span class="sep">/</span> <a href="../index.html">导出样本</a> <span class="sep">/</span> <span class="now">評分表範本</span></nav>
  <div class="page-title">評分表範本<small>2 个文件夹</small></div>
  <p class="section-hd">文件夹</p><div class="folder-grid"><a href="第一種/index.html" class="folder-card">  <div class="folder-icon">📁</div>  <div class="folder-name">第一種</div>  <div class="folder-arrow">打开 ›</div></a>
<a href="第二種/index.html" class="folder-card">  <div class="folder-icon">📁</div>  <div class="folder-name">第二種</div>  <div class="folder-arrow">打开 ›</div></a></div>
  <footer>gen_index.py</footer>
</div>
</body>
</html>
